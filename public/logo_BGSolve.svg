<svg width="320" height="200" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">

  <!-- Grupo escalado en X -->
  <g transform="scale(1.4,1) translate(-30,0)">

    <!-- Conexiones -->
    <line x1="100" y1="100" x2="100" y2="40" stroke="#22C55E" stroke-width="2"></line>
    <line x1="100" y1="100" x2="150" y2="65" stroke="#22C55E" stroke-width="2"></line>
    <line x1="100" y1="100" x2="150" y2="135" stroke="#22C55E" stroke-width="2"></line>
    <line x1="100" y1="100" x2="100" y2="160" stroke="#22C55E" stroke-width="2"></line>
    <line x1="100" y1="100" x2="50" y2="135" stroke="#22C55E" stroke-width="2"></line>
    <line x1="100" y1="100" x2="50" y2="65" stroke="#22C55E" stroke-width="2"></line>

    <!-- Nodo -->
    <circle cx="100" cy="100" r="6" fill="#22C55E"></circle>

    <!-- Rayo -->
    <polygon points="95,80 110,80 100,100 115,100 90,130 100,110 85,110" fill="#FFD60A"></polygon>

  </g>

  <!-- Texto ajustado -->
  <text x="165" y="160" text-anchor="middle" font-size="26" font-family="Arial Black" fill="#22C55E" letter-spacing="2">
    BGSolve
  </text>

</svg>